<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Selwyn Jesudas</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:   #ffffff;
        --ink:  #0a0a0a;
        --muted: #8a8a8a;
        --rule: #e8e8e8;
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: 'Syne', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Navbar ── */
      .nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        padding: 1.5rem 2rem;
        border-bottom: 1px solid var(--rule);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .nav__logo {
        font-weight: 800;
        font-size: 1.15rem;
        letter-spacing: -0.02em;
        text-decoration: none;
        color: var(--ink);
      }

      .nav__back {
        font-family: 'DM Mono', monospace;
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: color 0.2s;
      }

      .nav__back:hover { color: var(--ink); }

      /* ── Main ── */
      main {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding: 0 2rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      .label {
        font-family: 'DM Mono', monospace;
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 2rem;
      }

      .label::before {
        content: '';
        display: inline-block;
        width: 24px;
        height: 1px;
        background: var(--muted);
      }

      .big {
        font-weight: 800;
        font-size: clamp(6rem, 20vw, 16rem);
        letter-spacing: -0.05em;
        line-height: 0.85;
        color: var(--ink);
        position: relative;
        z-index: 2;
      }

      .ghost {
        font-weight: 800;
        font-size: clamp(5rem, 18vw, 14rem);
        letter-spacing: -0.05em;
        line-height: 1;
        color: transparent;
        -webkit-text-stroke: 1px var(--rule);
        position: absolute;
        top: 50%;
        left: 2rem;
        transform: translateY(-30%);
        z-index: 1;
        pointer-events: none;
        user-select: none;
        white-space: nowrap;
      }

      .type-wrap {
        position: relative;
        margin-bottom: 2.5rem;
      }

      .message {
        font-size: 1rem;
        font-weight: 500;
        color: var(--muted);
        line-height: 1.6;
        max-width: 400px;
        margin-bottom: 2.5rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-family: 'Syne', sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        padding: 0.75rem 1.75rem;
        background: var(--ink);
        color: var(--bg);
        border-radius: 2px;
        text-decoration: none;
        transition: opacity 0.2s, transform 0.2s;
      }

      .btn:hover {
        opacity: 0.75;
        transform: translateY(-1px);
      }

      /* ── Footer ── */
      footer {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        padding: 1.25rem 2rem;
        border-top: 1px solid var(--rule);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      footer span {
        font-family: 'DM Mono', monospace;
        font-size: 0.68rem;
        letter-spacing: 0.05em;
        color: var(--muted);
      }

      @media (max-width: 480px) {
        .ghost { display: none; }
        main { padding: 0 1.25rem; }
      }
    </style>
  </head>
  <body>

    <nav class="nav">
      <a href="/" class="nav__logo">SJ.</a>
      <a href="/" class="nav__back">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
        </svg>
        Back to portfolio
      </a>
    </nav>

    <p class="ghost" aria-hidden="true">Lost.</p>

    <main>
      <p class="label">Error</p>

      <div class="type-wrap">
        <h1 class="big">404</h1>
      </div>

      <p class="message">
        This page doesn't exist — or it moved somewhere else.
        Either way, there's nothing to see here.
      </p>

      <a href="/" class="btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
        </svg>
        Go home
      </a>
    </main>

    <footer>
      <span>Selwyn Jesudas</span>
      <span>© 2026</span>
    </footer>

  </body>
</html>
